version: "3.8"
services:
  api:
    image: minakshi2463/fastapi-app:latest
    env_file:
      - .env
    networks:
      - backend
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"


  postgres:
    image: postgres:16
    env_file:
      - .env
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgres
    restart: always
    expose:
      - "5432"

  redis:
    image: redis:7
    networks:
      - backend
    restart: always
    expose: 
      - "6379"


networks:
  backend:
    driver: bridge

volumes:
  postgres_data:  
